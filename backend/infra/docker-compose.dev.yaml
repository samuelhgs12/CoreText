version: "3.9"

services:
  database:
    image: postgres:17-alpine
    container_name: coretext-db-dev
    environment:
      POSTGRES_USER: coretext
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: coretext
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coretext"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped


  api:
    build:
      context: ..
      dockerfile: app/Dockerfile
      target: development
    container_name: coretext-api-dev
    environment:
      DATABASE_URL: postgresql+psycopg://coretext:dev_password@database:5432/coretext
      DEBUG: "True"
      LOG_LEVEL: debug
    ports:
      - "8000:8000"
    volumes:
      - ../app:/app/app
      - ../requirements.txt:/app/requirements.txt
    depends_on:
      database:
        condition: service_healthy
    command: >
      sh -c "pip install -r requirements.txt && 
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped


volumes:
  postgres_dev_data:
